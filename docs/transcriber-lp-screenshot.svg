<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720" role="img" aria-labelledby="title desc">
  <title id="title">Transcriber-LP desktop UI screenshot</title>
  <desc id="desc">A screenshot-style preview of the Transcriber-LP macOS transcription interface.</desc>
  <rect width="1080" height="720" fill="#f3f5f7"/>
  <rect x="0" y="0" width="1080" height="34" fill="#e7eaee"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="540" y="22" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#30343b">Transcriber-LP</text>

  <rect x="22" y="56" width="412" height="642" rx="8" fill="#ffffff" stroke="#d5dae1"/>
  <rect x="456" y="56" width="602" height="642" rx="8" fill="#ffffff" stroke="#d5dae1"/>

  <rect x="48" y="82" width="360" height="118" rx="8" fill="#fbfcfd" stroke="#8a95a3" stroke-width="2" stroke-dasharray="9 7"/>
  <text x="228" y="134" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21" font-weight="600" fill="#29313d">Drop video/audio here</text>
  <text x="228" y="164" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" fill="#687382">or click Browse</text>

  <rect x="48" y="216" width="360" height="34" rx="6" fill="#eff3f8" stroke="#c7ced8"/>
  <text x="228" y="238" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" fill="#1f2937">Browse...</text>
  <text x="48" y="278" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#566171">~/Movies/sample-interview.mov</text>

  <rect x="48" y="304" width="360" height="174" rx="8" fill="#fbfcfd" stroke="#d5dae1"/>
  <text x="66" y="330" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="600" fill="#29313d">Transcription</text>
  <text x="66" y="365" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#566171">Output format</text>
  <rect x="216" y="344" width="166" height="32" rx="5" fill="#ffffff" stroke="#c7ced8"/>
  <text x="232" y="365" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#1f2937">srt</text>
  <text x="66" y="405" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#566171">Model</text>
  <rect x="216" y="384" width="166" height="32" rx="5" fill="#ffffff" stroke="#c7ced8"/>
  <text x="232" y="405" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#1f2937">Medium (downloaded)</text>
  <text x="66" y="445" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#566171">Source language</text>
  <rect x="216" y="424" width="166" height="32" rx="5" fill="#ffffff" stroke="#c7ced8"/>
  <text x="232" y="445" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#1f2937">Auto-detect</text>

  <rect x="48" y="494" width="112" height="36" rx="6" fill="#2563eb"/>
  <text x="104" y="517" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" font-weight="600" fill="#ffffff">Transcribe</text>
  <rect x="170" y="494" width="84" height="36" rx="6" fill="#eff3f8" stroke="#c7ced8"/>
  <text x="212" y="517" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" fill="#29313d">Stop</text>
  <rect x="264" y="494" width="144" height="36" rx="6" fill="#eff3f8" stroke="#c7ced8"/>
  <text x="336" y="517" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="14" fill="#29313d">Open outputs</text>

  <rect x="48" y="548" width="360" height="92" rx="8" fill="#fbfcfd" stroke="#d5dae1"/>
  <text x="66" y="574" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="600" fill="#29313d">Model Manager</text>
  <text x="66" y="604" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#566171">Medium - downloaded - ggml-medium.bin</text>
  <text x="66" y="626" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#566171">Base - bundled - ggml-base.bin</text>

  <rect x="48" y="658" width="360" height="12" rx="6" fill="#d8dde5"/>
  <rect x="48" y="658" width="360" height="12" rx="6" fill="#34a853"/>
  <text x="48" y="690" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#566171">Ready</text>

  <text x="484" y="90" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="600" fill="#29313d">Log</text>
  <rect x="484" y="110" width="546" height="558" rx="6" fill="#111827"/>
  <text x="508" y="146" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#c7d2fe">Selected: ~/Movies/sample-interview.mov</text>
  <text x="508" y="176" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#d1d5db">=== TRANSCRIBER START ===</text>
  <text x="508" y="206" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#d1d5db">ffmpeg: third_party/macos/ffmpeg</text>
  <text x="508" y="236" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#d1d5db">whisper-cli: third_party/macos/whisper-cli</text>
  <text x="508" y="266" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#d1d5db">Language behavior: auto-detect</text>
  <text x="508" y="296" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#d1d5db">Output format: srt</text>
  <text x="508" y="326" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#86efac">Ready to transcribe.</text>
</svg>
